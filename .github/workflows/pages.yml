name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read  # needed to download artifacts from previous runs for rollback

# Never cancel an in-progress deploy — only queue one pending run at a time
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── UNIT TESTS (parallel) ────────────────────────────────────────────────────
  # Four fast data/logic suites run in parallel for quicker feedback.
  # Any failure blocks the build job before Chrome is even installed.

  smoke:
    name: "Test: smoke"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm run test:smoke

  coverage:
    name: "Test: coverage audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm run test:coverage

  regression:
    name: "Test: regression"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm run test:regression

  mockbalance:
    name: "Test: mock balance"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm run test:mockbalance

  # ── BUILD + AUDIT + BROWSER SMOKE ───────────────────────────────────────────
  # Runs only after all unit test jobs pass. Builds the site, audits deps for
  # high/critical CVEs, then runs the full Puppeteer browser smoke test.
  build:
    name: Build + audit + browser smoke
    needs: [smoke, coverage, regression, mockbalance]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies (high + critical)
        run: npm audit --audit-level=high

      - name: Build site
        run: npm run build

      - name: Setup Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1

      - name: Browser smoke test
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
        run: npm run test:browser

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      # Keep a copy of the built docs so the rollback job can redeploy a
      # previous run's artifact if the post-deploy health check fails.
      - name: Save rollback artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-candidate
          path: docs
          retention-days: 14

  # ── DEPLOY ───────────────────────────────────────────────────────────────────
  # Runs only when the build job passes.
  deploy:
    name: Deploy
    needs: build
    if: ${{ success() }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ── VERIFY ───────────────────────────────────────────────────────────────────
  # Hit the live URL after deploy. Retries every 10 s (up to ~90 s total) to
  # allow CDN propagation. Non-200 after all retries triggers the rollback job.
  verify:
    name: Verify live site
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Health check
        run: |
          URL="${{ needs.deploy.outputs.page_url }}"
          echo "Checking $URL"
          for i in 1 2 3 4 5 6 7 8 9; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Site is live."
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed after 9 attempts — triggering rollback."
          exit 1

  # ── ROLLBACK ─────────────────────────────────────────────────────────────────
  # Runs only when deploy succeeded but verify failed (broken live site).
  # Finds the last known-good workflow run, downloads its docs-candidate
  # artifact, and redeploys it so the previous working version is restored.
  rollback:
    name: Rollback to last stable
    needs: [deploy, verify]
    if: failure() && needs.deploy.result == 'success'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Find last successful run
        id: find-run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LAST_GOOD=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/pages.yml/runs?status=success&per_page=10" \
            --jq "[.workflow_runs[] | select(.id != ${{ github.run_id }})][0].id // empty")
          if [ -z "$LAST_GOOD" ]; then
            echo "No previous successful run found — cannot rollback automatically."
            exit 1
          fi
          echo "Rolling back to run $LAST_GOOD"
          echo "run_id=$LAST_GOOD" >> "$GITHUB_OUTPUT"

      - name: Download previous stable docs
        uses: actions/download-artifact@v4
        with:
          name: docs-candidate
          run-id: ${{ steps.find-run.outputs.run_id }}
          github-token: ${{ github.token }}
          path: docs-rollback

      - name: Re-upload as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-rollback

      - name: Deploy previous stable version
        id: deployment
        uses: actions/deploy-pages@v4
