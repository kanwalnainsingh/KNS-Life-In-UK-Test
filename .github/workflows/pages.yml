name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never cancel an in-progress deploy — only queue one pending run at a time
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── JOB 1: ALL TESTS ────────────────────────────────────────────────────────
  # Build the site, run every test suite. Deploy only starts if this passes.
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit and regression tests
        run: npm test

      - name: Build site
        run: npm run build

      - name: Setup Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1

      - name: Browser smoke test
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
        run: npm run test:browser

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  # ── JOB 2: DEPLOY ───────────────────────────────────────────────────────────
  # Runs only when every step in the test job passes. Gate is needs + if.
  deploy:
    name: Deploy
    needs: test
    if: ${{ success() }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
